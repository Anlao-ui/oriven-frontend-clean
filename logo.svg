<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <mask id="logo-mask">
      <rect width="200" height="200" fill="black"/>
      <!-- outer 4-pointed star -->
      <path fill="white" d="M100 4 C95 50 50 95 4 100 C50 105 95 150 100 196 C105 150 150 105 196 100 C150 95 105 50 100 4Z"/>
      <!-- cut inner star (creates star frame) -->
      <path fill="black" d="M100 20 C95 60 60 95 20 100 C60 105 95 140 100 180 C105 140 140 105 180 100 C140 95 105 60 100 20Z"/>
      <!-- add outer circle -->
      <circle cx="100" cy="100" r="43" fill="white"/>
      <!-- cut inner circle -->
      <circle cx="100" cy="100" r="34" fill="black"/>
    </mask>
  </defs>

  <!-- star frame + circle ring -->
  <rect width="200" height="200" fill="#52B788" mask="url(#logo-mask)"/>

  <!-- pen nib, tip pointing upper-right (45° CW from north) -->
  <g transform="translate(100,100) rotate(45)" fill="white">
    <!-- nib tip triangle -->
    <path d="M0,-28 L-7,-10 L7,-10 Z"/>
    <!-- nib wings / shoulder -->
    <path d="M-7,-10 L-13,2 L13,2 L7,-10 Z"/>
    <!-- barrel -->
    <rect x="-8" y="2" width="16" height="18" rx="3"/>
    <!-- center slit -->
    <line x1="0" y1="-27" x2="0" y2="2" stroke="#2D6A4F" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
